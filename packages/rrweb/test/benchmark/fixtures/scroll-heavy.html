<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>scroll-heavy fixture</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .section {
        height: 200px;
        border-bottom: 1px solid #ddd;
        padding: 16px;
        box-sizing: border-box;
      }
      .section:nth-child(even) {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script>
      /**
       * Creates a long page (500 sections × 200 px = 100 000 px tall) and
       * performs a throttled scroll loop that moves the viewport through the
       * entire page and back.
       *
       * window.runWorkload(passes) scrolls through the page the given number of
       * times (default 3).  Each pass emits ~(pageHeight / stepSize) scroll
       * events; at stepSize=500px that is ~200 events per pass.
       *
       * Resolves when all scroll passes are complete.
       */
      (function () {
        var SECTIONS = 500;
        var SCROLL_STEP = 500; // px per tick
        var TICK_DELAY = 16; // ms between scroll steps (~60 fps)

        // Build the long page up-front.
        var container = document.getElementById('container');
        var frag = document.createDocumentFragment();
        for (var i = 0; i < SECTIONS; i++) {
          var section = document.createElement('div');
          section.className = 'section';
          section.setAttribute('data-section', String(i));
          section.innerHTML =
            '<h2>Section ' +
            i +
            '</h2><p>Content for section ' +
            i +
            '. Lorem ipsum dolor sit amet.</p>';
          frag.appendChild(section);
        }
        container.appendChild(frag);

        var pageHeight = document.body.scrollHeight;

        function delay(ms) {
          return new Promise(function (resolve) {
            setTimeout(resolve, ms);
          });
        }

        async function scrollPass(direction) {
          var start = direction === 'down' ? 0 : pageHeight;
          var end = direction === 'down' ? pageHeight : 0;
          var step = direction === 'down' ? SCROLL_STEP : -SCROLL_STEP;
          var pos = start;
          while (
            direction === 'down' ? pos <= end : pos >= end
          ) {
            window.scrollTo(0, pos);
            pos += step;
            await delay(TICK_DELAY);
          }
          window.scrollTo(0, end);
        }

        window.runWorkload = async function (passes) {
          passes = passes !== undefined ? passes : 3;
          for (var p = 0; p < passes; p++) {
            await scrollPass('down');
            await scrollPass('up');
          }
        };
      })();
    </script>
  </body>
</html>
